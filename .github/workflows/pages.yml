name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    strategy:
      fail-fast: false
      matrix:
        include:
          - trip: tokyo
            base_path: /SplitNow
            out_subdir: ''
          - trip: china
            base_path: /SplitNow/china
            out_subdir: china
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Build (${{ matrix.trip }})
        env:
          NEXT_PUBLIC_TRIP: ${{ matrix.trip }}
          NEXT_PUBLIC_BASE_PATH: ${{ matrix.base_path }}
          NEXT_PUBLIC_SHEETS_API_URL: ${{ secrets.SHEETS_API_URL }}
          NEXT_PUBLIC_SHEETS_API_URL_CHINA: ${{ secrets.SHEETS_API_URL_CHINA }}
        run: npm run build
      - name: Stage build for combine
        run: |
          mkdir -p ../staging/${{ matrix.out_subdir }}
          cp -R out/. ../staging/${{ matrix.out_subdir }}/
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.trip }}
          path: staging
          retention-days: 1

  combine:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all trip builds
        uses: actions/download-artifact@v4
        with:
          path: builds
      - name: Merge into single Pages artifact
        run: |
          mkdir -p out
          for d in builds/*/; do
            cp -R "$d". out/
          done
          touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: combine
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
